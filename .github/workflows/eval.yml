name: Quran RAG CI Evaluation

on:
  pull_request:
    branches:
      - main

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Cache ChromaDB Store
      id: cache-chromadb
      uses: actions/cache@v4
      with:
        path: .chroma/
        key: ${{ runner.os }}-chromadb-${{ hashFiles('data/processed/chunks.json') }}
        restore-keys: |
          ${{ runner.os }}-chromadb-

    - name: Rebuild Vector Store (if cache invalid or missing)
      if: steps.cache-chromadb.outputs.cache-hit != 'true'
      run: |
        # Ensure directories exist
        mkdir -p data/processed
        # Check if chunks.json exists, if not generate it from raw data
        if [ ! -f data/processed/chunks.json ]; then
          echo "Generating chunks.json from raw data..."
          python ingest/download.py
          python ingest/merge.py
          python ingest/chunk.py
        fi
        echo "Building ChromaDB persistent store..."
        python store/chroma_store.py

    - name: Run Pipeline Evaluations
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # Run on a sample of 30 questions to verify accuracy and faithfulness
        python eval/run_eval.py --sample 30

    - name: Upload Evaluation Results Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: evaluation-results
        path: eval/results.json

    - name: Display Evaluation Summary
      if: always()
      run: |
        if [ -f eval/results.json ]; then
          echo "### Quran RAG Pipeline Evaluation Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Score | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          
          CIT_ACC=$(python -c "import json; print(json.load(open('eval/results.json'))['citation_accuracy'])")
          HALLS=$(python -c "import json; print(json.load(open('eval/results.json'))['total_hallucinations'])")
          
          echo "| Mean Citation Accuracy | $CIT_ACC | $([ $(echo \"$CIT_ACC >= 0.80\" | bc -l) -eq 1 ] && echo '✅ PASS' || echo '❌ FAIL') |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Hallucinated Citations | $HALLS | $([ $HALLS -eq 0 ] && echo '✅ PASS' || echo '⚠ WARNING') |" >> $GITHUB_STEP_SUMMARY
        else
          echo "Evaluation results not found." >> $GITHUB_STEP_SUMMARY
        fi
